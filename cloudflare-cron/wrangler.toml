name = "xpilot-cron"
main = "src/index.ts"
compatibility_date = "2026-02-18"

[observability.logs]
enabled = true

# ── Production (default) ──
# Deploy: npx wrangler deploy
# Secrets: npx wrangler secret put APP_BASE_URL / CRON_SECRET
# 4 triggers: every 2 min for media tasks + 3x daily for other jobs
# Cloudflare free plan: 5 triggers shared across all workers on account
[triggers]
crons = ["*/2 * * * *", "0 1 * * *", "0 13 * * *", "0 23 * * *"]

# ── Dev environment ──
# Deploy: npx wrangler deploy --env dev
# Secrets: npx wrangler secret put APP_BASE_URL --env dev
#          npx wrangler secret put CRON_SECRET --env dev
[env.dev]
name = "xpilot-cron-dev"

[env.dev.triggers]
crons = ["*/5 * * * *"]

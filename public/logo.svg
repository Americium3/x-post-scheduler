<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Blue rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Corner brackets (crosshair / target reticle feel) -->
  <!-- Top-left -->
  <path d="M100,180 L100,100 L180,100" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Top-right -->
  <path d="M332,100 L412,100 L412,180" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-left -->
  <path d="M100,332 L100,412 L180,412" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom-right -->
  <path d="M412,332 L412,412 L332,412" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bold X in the center -->
  <line x1="180" y1="180" x2="332" y2="332" stroke="white" stroke-width="48" stroke-linecap="round"/>
  <line x1="332" y1="180" x2="180" y2="332" stroke="white" stroke-width="48" stroke-linecap="round"/>
</svg>
